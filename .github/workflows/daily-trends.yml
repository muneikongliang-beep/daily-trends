name: Daily Trend Collection

on:
  schedule:
    - cron: '0 22 * * *'   # 22:00 UTC = 朝7時 JST
  workflow_dispatch:        # 手動実行ボタン(検証用)

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install feedparser

      - name: Collect trends
        run: |
          mkdir -p data
          python scripts/collect.py

      - name: Commit results
        run: |
          git config user.name  "trend-bot"
          git config user.email "trend-bot@users.noreply.github.com"
          git add data/
          git commit -m "trends: $(date -u +%Y-%m-%d)" || echo "no changes"
          git push
